<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Examenomgeving SOFTWARE</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 20px;
        font-size: 24px;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
        padding: 40px;
    }

    .card {
        background: white;
        width: 280px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card h2 {
        margin-bottom: 15px;
        color: #2c3e50;
    }

    .card p {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
    }

    .card button {
        padding: 10px 20px;
        background: #3498db;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .card button:hover {
        background: #2980b9;
    }
</style>
</head>

<body>

<header>
    Examenomgeving SOFTWARE
</header>

<div class="container">

    <div class="card">
        <h2>SmartSchool</h2>
        <p>Volg deze link om SmartSchool te openen.</p>
        <button onclick="openLink('rp.smartschool.be')">
            SmartSchool
        </button>
    </div>

    <div class="card">
        <h2>Diagrammen tekenen</h2>
        <p>Met deze tool kan je diagrammen tekenen.</p>
        <a>Bekijk hier de handleiding.</a>
        <button onclick="openLink('https://app.diagrams.net/')">
            Draw.io
        </button>
    </div>
    
    <div class="card">
        <h2>Visual Studio Code</h2>
        <p>Heb je problemen met Visual Studio Code op je computer? Gebruik de online versie.</p>
        <button onclick="openLink('https://vscode.dev/')">
            VS Code online
        </button>
    </div>

</div>

<script>
function openLink(url) {
    window.location.href = url;
}
</script>

</body>
</html>
